
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule/Scores • Frozen Diamond Classic</title>
  <link rel="stylesheet" href="./styles.css?v=hamburger3" />
</head>

<body class="watermarkPage schedulePage hasHamburger">
  <header class="siteHeader">
    <!-- Hamburger wrapper -->
    <div class="navWrap">
      <button
        class="navToggle"
        type="button"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="siteNav"
      >
        <span></span><span></span><span></span>
      </button>

      <div class="navOverlay" aria-hidden="true"></div>

      <nav class="nav" id="siteNav">
        <a href="./">Home</a>
        <a href="./schedule.html" class="active">Schedule/Scores</a>
        <a href="./standings.html">Standings</a>
        <a href="./stats.html">Stats</a>
        <a href="./teams.html">Teams</a>
        <a href="./rules.html">Rules</a>
        <a href="./contacts.html">Contacts</a>
        <a href="./gallery.html">Gallery</a>
        <a href="./uploads.html">Uploads</a>
      </nav>
    </div>

    <div class="brandCenter">
      <img src="./logo.png" alt="Frozen Diamond Classic Logo" class="logoImage" />
      <h1>Frozen Diamond Classic</h1>
      <div class="tagline">Tournament Central</div>
    </div>
  </header>

  <main class="wrap">
    <!-- Page intro -->
    <section class="docSection">
      <h2>Schedule / Scores</h2>
      <p class="muted">Live schedule pulled from the Google Sheet. Games update when marked <strong>Final</strong>.</p>
    </section>

    <!-- Bracket (your script.js renders into #bracket) -->
    <section class="docSection">
      <div id="bracket" class="bracket"></div>
    </section>

    <!-- Full schedule table (your script.js renders into #scheduleTable tbody) -->
    <section class="docSection">
      <div class="card">
        <div class="cardBody">
          <div class="tableWrap">
            <table id="scheduleTable">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Field</th>
                  <th>Game</th>
                  <th>Matchup</th>
                  <th>Score</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div id="lastUpdated" class="muted small" style="margin-top:12px;"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Data + rendering -->
  <script src="./data.js"></script>
  <script src="./script.js"></script>

  <!-- Hamburger behavior -->
  <script src="./nav.js"></script>
</body>
</html>
